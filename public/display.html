<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Survey Display - Best Chef</title>
  <link rel="stylesheet" href="/styles.css?v=3">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
</head>
<body class="survey-body">
  <div class="survey-fullscreen">
    <h1 class="survey-title">Who is the better chef?</h1>

    <div class="survey-content">
      <!-- Left: Photos and Names -->
      <div class="chefs-section">
        <div class="chef-item">
          <div class="display-image-wrapper">
            <img src="/julia-child.jpg" alt="Julia Child" class="display-chef-image">
          </div>
          <div class="chef-name">Julia Child</div>
        </div>
        <div class="chef-item">
          <div class="display-image-wrapper">
            <img src="/betty%20crocker.jpg" alt="Betty Crocker" class="display-chef-image">
          </div>
          <div class="chef-name">Betty Crocker</div>
        </div>
      </div>

      <!-- Center: Horizontal Bars -->
      <div class="horizontal-bars">
        <div class="bar-row">
          <div class="bar-track">
            <div class="bar-fill bar-julia" id="julia-bar"></div>
          </div>
          <div class="bar-count" id="julia-count">0</div>
        </div>
        <div class="bar-row">
          <div class="bar-track">
            <div class="bar-fill bar-betty" id="betty-bar"></div>
          </div>
          <div class="bar-count" id="betty-count">0</div>
        </div>
      </div>

      <!-- Right: QR Code -->
      <div class="qr-container">
        <div id="qrcode"></div>
      </div>
    </div>

    <div id="alfred-message" style="display: none; position: fixed; bottom: 0; left: 0; right: 0; background: #f8f6f1; color: #000; padding: 60px; text-align: center; font-size: 112px; font-weight: bold; font-family: 'Lato', sans-serif; border-top: 16px solid #000; box-shadow: 0 -4px 16px rgba(0,0,0,0.2); animation: flash 1s infinite;">
      Having problems? Call Alfred on +61 433 941 370
    </div>
  </div>

  <style>
    @keyframes flash {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.5; }
    }
  </style>

  <script>
    const surveyUrl = `${window.location.origin}/survey/vote`;
    let clickCount = 0;
    let clickTimer = null;
    let previousVotes = { julia: 0, betty: 0 };
    let isFirstLoad = true;

    function renderQrCode() {
      const qrContainer = document.getElementById('qrcode');
      qrContainer.innerHTML = '';

      new QRCode(qrContainer, {
        text: surveyUrl,
        width: 600,
        height: 600,
        colorDark: '#111111',
        colorLight: '#ffffff'
      });
    }

    function updateDisplay(votes) {
      const julia = Number(votes.julia) || 0;
      const betty = Number(votes.betty) || 0;

      // Calculate width based on the maximum of the two vote counts
      // This makes bars grow proportionally to votes, not percentages
      const maxVotes = Math.max(julia, betty, 1); // At least 1 to avoid division by zero
      const juliaPercent = (julia / maxVotes) * 100;
      const bettyPercent = (betty / maxVotes) * 100;

      const hasChanged = julia !== previousVotes.julia || betty !== previousVotes.betty;

      document.getElementById('julia-count').textContent = julia;
      document.getElementById('betty-count').textContent = betty;

      const juliaBar = document.getElementById('julia-bar');
      const bettyBar = document.getElementById('betty-bar');

      // On first load, animate from 0 to current values
      if (isFirstLoad) {
        // Start at 0
        juliaBar.style.width = '0%';
        bettyBar.style.width = '0%';

        // Force browser to apply 0% width
        void juliaBar.offsetWidth;

        // Then animate to target values
        setTimeout(() => {
          juliaBar.style.width = `${juliaPercent}%`;
          bettyBar.style.width = `${bettyPercent}%`;
        }, 50);

        isFirstLoad = false;
        previousVotes = { julia, betty };
      } else {
        // Normal updates - just set the width, CSS transition will handle animation
        juliaBar.style.width = `${juliaPercent}%`;
        bettyBar.style.width = `${bettyPercent}%`;
      }

      if (hasChanged && !isFirstLoad) {
        juliaBar.classList.add('animate');
        bettyBar.classList.add('animate');

        setTimeout(() => {
          juliaBar.classList.remove('animate');
          bettyBar.classList.remove('animate');
        }, 600);

        previousVotes = { julia, betty };
      }
    }

    async function fetchVotes() {
      try {
        const response = await fetch('/api/votes');
        const votes = await response.json();
        updateDisplay(votes);
      } catch (error) {
        console.error('Error fetching votes:', error);
      }
    }

    async function resetVotes() {
      try {
        await fetch('/api/reset', { method: 'POST' });
        fetchVotes();
      } catch (error) {
        console.error('Error resetting votes:', error);
      }
    }

    document.getElementById('qrcode').addEventListener('click', () => {
      clickCount++;

      if (clickTimer) {
        clearTimeout(clickTimer);
      }

      if (clickCount === 3) {
        resetVotes();
        clickCount = 0;
      } else {
        clickTimer = setTimeout(() => {
          clickCount = 0;
        }, 500);
      }
    });

    async function checkAlfredStatus() {
      try {
        const response = await fetch('/api/survey/alfred-status');
        const data = await response.json();
        const messageEl = document.getElementById('alfred-message');
        messageEl.style.display = data.visible ? 'block' : 'none';
      } catch (error) {
        console.error('Error checking alfred status:', error);
      }
    }

    renderQrCode();
    fetchVotes();
    checkAlfredStatus();
    window.setInterval(fetchVotes, 500);
    window.setInterval(checkAlfredStatus, 1000);
  </script>
</body>
</html>
