<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Audition Booking</title>
    <style>
      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        background: #f8f6f1;
        color: #111111;
        font-family: Georgia, "Times New Roman", serif;
      }

      .page {
        width: min(760px, calc(100% - 32px));
        margin: 0 auto;
        padding: 24px 0 64px;
      }

      .masthead {
        text-align: center;
        margin-bottom: 24px;
      }

      .logo {
        width: min(100%, 560px);
        height: auto;
        display: block;
        margin: 0 auto 18px;
      }

      h1 {
        margin: 0 0 12px;
        font-size: clamp(24px, 5vw, 44px);
        font-weight: 400;
        line-height: 1.05;
        letter-spacing: 0.02em;
        text-transform: uppercase;
      }

      .intro,
      .copy,
      .status,
      .confirmation p,
      .tiny {
        font-size: 17px;
        line-height: 1.65;
      }

      .intro {
        margin: 0 auto 24px;
        max-width: 700px;
      }

      .copy {
        margin-bottom: 28px;
      }

      .copy p {
        margin: 0 0 16px;
      }

      .section-title {
        margin: 0 0 10px;
        font-size: 15px;
        font-weight: 700;
        letter-spacing: 0.18em;
        text-transform: uppercase;
      }

      .step-panel,
      .confirmation-step {
        display: none;
      }

      .step-panel.is-visible,
      .confirmation-step.is-visible {
        display: block;
      }

      form {
        display: grid;
        gap: 22px;
        margin: 0 0 22px;
      }

      label {
        display: grid;
        gap: 8px;
        font-size: 13px;
        letter-spacing: 0.12em;
        text-transform: uppercase;
      }

      input {
        width: 100%;
        padding: 10px 0 12px;
        border: 0;
        border-bottom: 1px solid #111111;
        background: transparent;
        color: #111111;
        font: inherit;
        font-size: 18px;
        border-radius: 0;
      }

      input:focus,
      button:focus,
      .download-link:focus {
        outline: 2px solid rgba(0, 0, 0, 0.18);
        outline-offset: 2px;
      }

      button,
      .download-link {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        border: 1px solid #111111;
        border-radius: 999px;
        padding: 10px 16px;
        background: #ffffff;
        color: #111111;
        font: inherit;
        font-weight: 700;
        text-decoration: none;
        cursor: pointer;
        transition:
          background 160ms ease,
          color 160ms ease,
          opacity 160ms ease;
      }

      button:hover,
      .download-link:hover {
        background: #111111;
        color: #ffffff;
      }

      button:disabled {
        cursor: not-allowed;
        opacity: 0.55;
      }

      .small-button {
        padding: 7px 12px;
        font-size: 13px;
        letter-spacing: 0.06em;
        text-transform: uppercase;
      }

      .status {
        display: none;
        margin: 0 0 18px;
      }

      .status.is-visible {
        display: block;
      }

      .step-stack {
        display: grid;
        gap: 30px;
      }

      .slots-panel {
        display: none;
        padding-top: 18px;
        border-top: 1px solid #111111;
      }

      .slots-panel.is-visible {
        display: block;
      }

      .slot-picker {
        max-height: 340px;
        overflow-y: auto;
        padding: 12px 0;
        border-top: 1px solid rgba(17, 17, 17, 0.14);
        border-bottom: 1px solid rgba(17, 17, 17, 0.14);
        scrollbar-width: thin;
      }

      .slot-groups {
        display: grid;
        gap: 14px;
      }

      .slot-row {
        display: grid;
        grid-template-columns: 180px 1fr;
        gap: 18px;
        align-items: start;
      }

      .slot-day {
        font-size: 16px;
        line-height: 1.4;
        padding-top: 8px;
        position: sticky;
        top: 0;
        align-self: start;
        background: #f8f6f1;
        z-index: 1;
      }

      .slot-times {
        padding-left: 18px;
        border-left: 1px solid rgba(17, 17, 17, 0.18);
      }

      .slot-grid {
        display: grid;
        grid-template-columns: 1fr;
        gap: 10px;
        align-items: start;
        justify-items: center;
      }

      .slot-button {
        text-align: center;
        padding: 9px 14px;
        min-height: 0;
        font-size: 15px;
        line-height: 1.2;
        width: min(100%, 260px);
        justify-content: center;
        border-radius: 14px;
      }

      .slot-button.is-selected {
        background: #111111;
        color: #ffffff;
      }

      .slot-button.is-unavailable {
        opacity: 0.34;
        cursor: default;
        text-decoration: line-through;
      }

      .selection-row {
        display: flex;
        align-items: baseline;
        gap: 14px;
        margin-top: 18px;
        flex-wrap: wrap;
      }

      .pack-section {
        padding-top: 18px;
        border-top: 1px solid #111111;
      }

      .pack-toolbar {
        display: flex;
        justify-content: center;
        margin-top: 4px;
      }

      .confirmation {
        display: none;
        margin-top: 18px;
      }

      .confirmation.is-visible {
        display: block;
      }

      .confirmation h2 {
        margin: 0 0 12px;
        font-size: 24px;
        font-weight: 400;
        text-transform: uppercase;
        letter-spacing: 0.08em;
      }

      .confirmation p {
        margin: 0 0 10px;
      }

      .confirmation-actions {
        display: flex;
        justify-content: center;
        margin-top: 18px;
      }

      @media (max-width: 760px) {
        .page {
          width: min(100% - 24px, 760px);
          padding-top: 20px;
        }

        .intro,
        .copy,
        .status,
        .confirmation p,
        .tiny {
          font-size: 16px;
        }

        .slot-row {
          grid-template-columns: 1fr;
          gap: 10px;
        }

        .slot-day {
          padding-top: 0;
          position: static;
        }

        .slot-times {
          padding-left: 0;
          border-left: 0;
        }
      }
    </style>
  </head>
  <body>
    <main class="page">
      <header class="masthead">
        <img
          src="/logo-black.png"
          alt="Alfred Kouris and Harry Stacey Bake a Cake"
          class="logo"
        />
        <h1>Voiceover Audition Booking</h1>
        <p class="intro">Join part of theatre history.</p>
      </header>

      <div id="status" class="status info" aria-live="polite"></div>

      <section id="register-step">
        <h2 class="section-title">Step 1: Register</h2>

        <form id="register-form">
          <label>
            Full name
            <input
              id="name"
              name="name"
              type="text"
              autocomplete="name"
              required
            />
          </label>

          <label>
            Email address
            <input
              id="email"
              name="email"
              type="email"
              autocomplete="email"
              required
            />
          </label>

          <div>
            <button id="register-button" type="submit">Continue</button>
          </div>
        </form>
      </section>

      <section id="booking-step" class="step-panel">
        <div class="step-stack">
          <div id="slots-panel" class="slots-panel">
            <h2 class="section-title">Step 2: Pick A Time</h2>
            <div class="slot-picker">
              <div id="slot-grid" class="slot-groups"></div>
            </div>

            <div class="selection-row">
              <button id="book-button" type="button" disabled>
                Confirm Audition Slot
              </button>
              <span id="selected-copy" class="tiny">No slot selected yet.</span>
            </div>
          </div>

          <div class="pack-section">
            <div class="pack-toolbar">
              <a
                id="pack-download-button"
                class="download-link"
                href="#"
                download
                >Download Audition Pack</a
              >
            </div>
          </div>
        </div>
      </section>

      <section id="confirmation-step" class="confirmation-step">
        <div id="confirmation" class="confirmation"></div>
      </section>
    </main>

    <script>
      const registerForm = document.getElementById("register-form");
      const registerButton = document.getElementById("register-button");
      const registerStep = document.getElementById("register-step");
      const bookingStep = document.getElementById("booking-step");
      const confirmationStep = document.getElementById("confirmation-step");
      const slotsPanel = document.getElementById("slots-panel");
      const slotGrid = document.getElementById("slot-grid");
      const statusBox = document.getElementById("status");
      const bookButton = document.getElementById("book-button");
      const selectedCopy = document.getElementById("selected-copy");
      const confirmationBox = document.getElementById("confirmation");
      const nameInput = document.getElementById("name");
      const emailInput = document.getElementById("email");
      const packDownloadButton = document.getElementById(
        "pack-download-button",
      );

      const STORAGE_KEY = "audition-registration-token";

      const state = {
        registrationToken: "",
        slots: [],
        selectedSlotStart: "",
        existingBooking: null,
      };

      const slotDayFormatter = new Intl.DateTimeFormat("en-AU", {
        timeZone: "Australia/Sydney",
        weekday: "long",
        day: "numeric",
        month: "long",
      });

      const slotTimeFormatter = new Intl.DateTimeFormat("en-AU", {
        timeZone: "Australia/Sydney",
        hour: "numeric",
        minute: "2-digit",
      });

      function setStatus(message, type = "info") {
        if (!message) {
          statusBox.textContent = "";
          statusBox.className = "status";
          return;
        }

        statusBox.textContent = message;
        statusBox.className = `status is-visible ${type}`;
      }

      function setRegisterBusy(isBusy) {
        registerButton.disabled = isBusy;
        registerButton.textContent = isBusy ? "Continuing..." : "Continue";
      }

      function setBookingBusy(isBusy) {
        bookButton.disabled =
          isBusy || !state.selectedSlotStart || Boolean(state.existingBooking);
        bookButton.textContent = isBusy
          ? "Confirming..."
          : "Confirm Audition Slot";
      }

      function setViewMode(mode) {
        registerStep.style.display = mode === "register" ? "block" : "none";
        bookingStep.classList.toggle("is-visible", mode === "booking");
        confirmationStep.classList.toggle("is-visible", mode === "confirmed");
      }

      function formatWindow(windowStart, windowEnd, timezone) {
        const start = new Date(windowStart);
        const end = new Date(windowEnd);
        const header = new Intl.DateTimeFormat("en-AU", {
          timeZone: timezone,
          weekday: "long",
          day: "numeric",
          month: "long",
        }).format(start);
        const times = new Intl.DateTimeFormat("en-AU", {
          timeZone: timezone,
          hour: "numeric",
          minute: "2-digit",
        });

        return `${header}, ${times.format(start)} to ${times.format(end)}`;
      }

      function showConfirmationOnly(booking, message) {
        state.existingBooking = booking;
        state.selectedSlotStart = "";
        const downloadHref = state.registrationToken
          ? `/api/audition/pack?registrationToken=${encodeURIComponent(state.registrationToken)}&download=1`
          : "#";
        confirmationBox.className = "confirmation is-visible";
        confirmationBox.innerHTML = `
        <h2>Audition Confirmed</h2>
        <p><strong>${booking.slot.label}</strong></p>
        <p>${message}</p>
        <div class="confirmation-actions">
          <a class="download-link" href="${downloadHref}" download>Download Audition Pack</a>
        </div>
      `;
        setViewMode("confirmed");
      }

      function formatSlotDay(slotStart) {
        return slotDayFormatter.format(new Date(slotStart));
      }

      function formatSlotTime(slotStart, slotEnd) {
        const startText = slotTimeFormatter
          .format(new Date(slotStart))
          .replace(/\s/g, "");
        const endText = slotTimeFormatter
          .format(new Date(slotEnd))
          .replace(/\s/g, "");
        return `${startText} - ${endText}`;
      }

      function groupSlotsByDay(slots) {
        const groups = [];
        const map = new Map();

        slots.forEach((slot) => {
          const dayLabel = formatSlotDay(slot.start);

          if (!map.has(dayLabel)) {
            const group = { dayLabel, slots: [] };
            map.set(dayLabel, group);
            groups.push(group);
          }

          map.get(dayLabel).slots.push(slot);
        });

        return groups;
      }

      function renderSlots() {
        slotGrid.innerHTML = "";
        state.selectedSlotStart = "";
        selectedCopy.textContent = "No slot selected yet.";
        setBookingBusy(false);

        const availableSlots = state.slots.filter((slot) => slot.available);

        if (!state.slots.length) {
          slotGrid.innerHTML =
            '<p class="tiny">No slots are configured yet.</p>';
          return;
        }

        if (!availableSlots.length) {
          slotGrid.innerHTML =
            '<p class="tiny">All audition slots have been booked.</p>';
          return;
        }

        groupSlotsByDay(state.slots).forEach((group) => {
          const row = document.createElement("div");
          row.className = "slot-row";

          const dayCell = document.createElement("div");
          dayCell.className = "slot-day";
          dayCell.textContent = group.dayLabel;

          const timesCell = document.createElement("div");
          timesCell.className = "slot-times";

          const timesGrid = document.createElement("div");
          timesGrid.className = "slot-grid";

          group.slots.forEach((slot) => {
            const button = document.createElement("button");
            button.type = "button";
            button.className = `slot-button${slot.available ? "" : " is-unavailable"}`;
            button.textContent = formatSlotTime(slot.start, slot.end);
            button.disabled = !slot.available;

            button.addEventListener("click", () => {
              state.selectedSlotStart = slot.start;
              selectedCopy.textContent = `Selected: ${group.dayLabel}, ${formatSlotTime(slot.start, slot.end)}`;

              Array.from(slotGrid.querySelectorAll(".slot-button")).forEach(
                (candidate) => {
                  candidate.classList.remove("is-selected");
                },
              );

              button.classList.add("is-selected");
              setBookingBusy(false);
            });

            timesGrid.appendChild(button);
          });

          timesCell.appendChild(timesGrid);
          row.appendChild(dayCell);
          row.appendChild(timesCell);
          slotGrid.appendChild(row);
        });
      }

      async function loadSlots(token, successMessage = "") {
        setStatus(
          successMessage || "Loading available audition times...",
          "info",
        );

        const response = await fetch(
          `/api/audition/slots?registrationToken=${encodeURIComponent(token)}`,
        );
        const data = await response.json();

        if (!response.ok) {
          throw new Error(data.error || "Could not load audition slots.");
        }

        state.registrationToken = token;
        state.slots = data.slots;
        state.existingBooking = data.existingBooking || null;
        sessionStorage.setItem(STORAGE_KEY, token);

        packDownloadButton.href = `/api/audition/pack?registrationToken=${encodeURIComponent(token)}&download=1`;

        if (state.existingBooking) {
          showConfirmationOnly(
            state.existingBooking,
            "You already have an audition slot booked.",
          );
          setStatus("", "info");
          return;
        }

        setViewMode("booking");
        slotsPanel.classList.add("is-visible");
        renderSlots();
        setStatus(
          successMessage || "Choose a time, then download your audition pack underneath.",
          "success",
        );
        bookingStep.scrollIntoView({ behavior: "smooth", block: "start" });
      }

      registerForm.addEventListener("submit", async (event) => {
        event.preventDefault();
        setRegisterBusy(true);

        try {
          const response = await fetch("/api/audition/register", {
            method: "POST",
            headers: {
              "Content-Type": "application/json",
            },
            body: JSON.stringify({
              name: nameInput.value,
              email: emailInput.value,
            }),
          });

          const data = await response.json();

          if (!response.ok) {
            throw new Error(data.error || "Could not complete registration.");
          }

          await loadSlots(data.registrationToken, data.message);
        } catch (error) {
          setStatus(
            error.message || "Could not complete registration.",
            "error",
          );
        } finally {
          setRegisterBusy(false);
        }
      });

      bookButton.addEventListener("click", async () => {
        if (!state.registrationToken || !state.selectedSlotStart) {
          return;
        }

        setBookingBusy(true);
        setStatus("Confirming your audition slot...", "info");

        try {
          const response = await fetch("/api/audition/book", {
            method: "POST",
            headers: {
              "Content-Type": "application/json",
            },
            body: JSON.stringify({
              registrationToken: state.registrationToken,
              slotStart: state.selectedSlotStart,
            }),
          });

          const data = await response.json();

          if (!response.ok) {
            const bookingError = new Error(
              data.error || "Could not book that slot.",
            );
            if (data.existingBooking) {
              bookingError.existingBooking = data.existingBooking;
            }
            throw bookingError;
          }

          setStatus("", "info");
          showConfirmationOnly(data, "Your audition slot has been booked.");
        } catch (error) {
          if (error.existingBooking) {
            setStatus("", "info");
            showConfirmationOnly(
              error.existingBooking,
              "You already have an audition slot booked.",
            );
            return;
          }

          setStatus(error.message || "Could not book that slot.", "error");
          setBookingBusy(false);
        }
      });

      (async function restoreSession() {
        const existingToken = sessionStorage.getItem(STORAGE_KEY);

        if (!existingToken) {
          setViewMode("register");
          return;
        }

        try {
          await loadSlots(
            existingToken,
            "You can continue where you left off.",
          );
        } catch (error) {
          sessionStorage.removeItem(STORAGE_KEY);
          setViewMode("register");
          setStatus("Please register again to continue.", "info");
        }
      })();
    </script>
  </body>
</html>
