<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cupcake Gallery</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Lato:wght@300;400;700;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/race/styles.css">
  <script src="/race/cakes.js"></script>
</head>
<body class="cupcake-gallery-body">
  <main class="cupcake-gallery">
    <header class="cupcake-gallery-header">
      <div>
        <h1>All 55 Cupcakes</h1>
        <p>This page previews every cupcake available to the race. Each entrant gets a unique cupcake, so this gallery matches the full pool.</p>
      </div>
    </header>

    <section class="cupcake-gallery-grid" id="cupcake-gallery-grid"></section>
  </main>

  <script>
    const grid = document.getElementById('cupcake-gallery-grid');

    grid.innerHTML = CAKES.map((cake) => `
      <article class="cupcake-card">
        <div class="cupcake-card-visual">${generateCakeSVG(cake)}</div>
        <span class="cupcake-card-id">#${String(cake.id).padStart(2, '0')}</span>
        <span class="cupcake-card-name">${cake.name}</span>
      </article>
    `).join('');
  </script>
</body>
</html>
