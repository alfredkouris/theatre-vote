<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="mobile-web-app-capable" content="yes">
  <style>
    * {
      touch-action: manipulation;
    }
  </style>
  <title>Cake Race</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Lato:wght@300;400;700;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
  <script src="cakes.js"></script>
</head>
<body class="player-screen">
  <!-- Preview screen -->
  <div id="preview-screen" class="preview-screen">
    <div class="preview-content">
      <h2 class="preview-title">You are...</h2>
      <div class="preview-cake" id="preview-cake"></div>
      <h1 class="preview-name" id="preview-name">Loading...</h1>
      <button id="join-button" class="join-button">JOIN RACE</button>
    </div>
  </div>

  <!-- Full screen tap button -->
  <div id="tap-screen" class="tap-screen" style="display: none;">
    <div class="tap-cake" id="tap-cake"></div>
    <div class="tap-prompt">TAP!</div>
    <div class="tap-ripple" id="tap-ripple"></div>
  </div>

  <!-- Loading state -->
  <div id="loading-screen" class="loading-screen" style="display: none;">
    <div class="loading-spinner"></div>
    <p>Joining race...</p>
  </div>

  <!-- Eliminated state -->
  <div id="eliminated-screen" class="eliminated-screen" style="display: none;">
    <div class="eliminated-cake" id="eliminated-cake"></div>
    <h2>Thanks for playing!</h2>
    <p class="eliminated-message">You've been eliminated</p>
  </div>

  <!-- Winner state -->
  <div id="winner-screen-player" class="winner-screen-player" style="display: none;">
    <div class="winner-cake-player" id="winner-cake-player"></div>
    <h2>🎉 YOU WON! 🎉</h2>
  </div>

  <script>
    let playerId = null;
    let cakeData = null;
    let isEliminated = false;
    let isWinner = false;
    let canTap = false;

    // Load preview on page load
    window.addEventListener('load', async () => {
      try {
        const response = await fetch('/api/race/join', { method: 'POST' });
        const data = await response.json();

        playerId = data.playerId;
        cakeData = getCakeById(data.cakeId);

        // Show preview screen with cake
        const previewScreen = document.getElementById('preview-screen');
        previewScreen.style.background = `linear-gradient(135deg, ${cakeData.bodyColor}, ${cakeData.frostingColor})`;
        document.getElementById('preview-cake').innerHTML = generateCakeSVG(cakeData);
        document.getElementById('preview-name').textContent = data.cakeName;
      } catch (error) {
        console.error('Error loading preview:', error);
        document.getElementById('preview-name').textContent = 'Connection error. Please refresh.';
      }
    });

    // Join race when button clicked
    document.getElementById('join-button').addEventListener('click', () => {
      // Hide preview
      document.getElementById('preview-screen').style.display = 'none';

      // Show tap screen with cake color
      const tapScreen = document.getElementById('tap-screen');
      tapScreen.style.background = `linear-gradient(135deg, ${cakeData.bodyColor}, ${cakeData.frostingColor})`;
      tapScreen.style.display = 'flex';

      // Show cake
      document.getElementById('tap-cake').innerHTML = generateCakeSVG(cakeData);

      canTap = true;

      // Start polling
      startPolling();
    });

    // Handle tap (entire screen is tappable)
    document.addEventListener('click', async (e) => {
      if (!playerId || !canTap || isEliminated || isWinner) return;

      // Visual feedback
      createRipple(e.clientX, e.clientY);

      // Animate cake
      const cakeElement = document.getElementById('tap-cake');
      cakeElement.classList.add('tapped');
      setTimeout(() => cakeElement.classList.remove('tapped'), 100);

      // Send tap to server
      try {
        await fetch('/api/race/tap', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ playerId })
        });
      } catch (error) {
        console.error('Tap error:', error);
      }
    });

    // Create ripple effect
    function createRipple(x, y) {
      const ripple = document.createElement('div');
      ripple.className = 'ripple-effect';
      ripple.style.left = x + 'px';
      ripple.style.top = y + 'px';
      document.body.appendChild(ripple);

      setTimeout(() => ripple.remove(), 600);
    }

    // Poll status
    async function pollStatus() {
      try {
        const response = await fetch('/api/race/status');
        const state = await response.json();

        const player = state.players[playerId];
        if (!player) return;

        // Check if eliminated
        if (player.eliminated && !isEliminated) {
          isEliminated = true;
          canTap = false;
          showEliminated();
        }

        // Check if winner
        if (state.status === 'complete') {
          const round4 = state.rounds[4] || state.rounds[state.currentRound];
          if (round4 && round4.winners && round4.winners[0] === playerId && !isWinner) {
            isWinner = true;
            canTap = false;
            showWinner();
          }
        }

        // Enable/disable tapping based on race status
        if (state.status === 'racing') {
          canTap = true;
        } else if (state.status === 'waiting' || state.status === 'round-complete') {
          canTap = false;
        }
      } catch (error) {
        console.error('Poll error:', error);
      }
    }

    function startPolling() {
      pollStatus();
      setInterval(pollStatus, 1000);
    }

    function showEliminated() {
      document.getElementById('tap-screen').style.display = 'none';

      const eliminatedScreen = document.getElementById('eliminated-screen');
      eliminatedScreen.style.background = `linear-gradient(135deg, ${cakeData.bodyColor}80, ${cakeData.frostingColor}80)`;
      eliminatedScreen.style.display = 'flex';

      document.getElementById('eliminated-cake').innerHTML = generateCakeSVG(cakeData);
    }

    function showWinner() {
      document.getElementById('tap-screen').style.display = 'none';

      const winnerScreen = document.getElementById('winner-screen-player');
      winnerScreen.style.background = `linear-gradient(135deg, ${cakeData.bodyColor}, ${cakeData.frostingColor})`;
      winnerScreen.style.display = 'flex';

      document.getElementById('winner-cake-player').innerHTML = generateCakeSVG(cakeData);
    }
  </script>
</body>
</html>
