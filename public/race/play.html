<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, minimum-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="mobile-web-app-capable" content="yes">
  <style>
    * {
      touch-action: manipulation;
    }

    html, body {
      overscroll-behavior: none;
    }
  </style>
  <title>Cake Race</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Lato:wght@300;400;700;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
  <script src="cakes.js"></script>
</head>
<body class="player-screen">
  <!-- Preview screen -->
  <div id="preview-screen" class="preview-screen">
    <div class="preview-content">
      <h2 class="preview-title">Your Cake</h2>
      <h1 class="preview-name" id="preview-name">Loading...</h1>
      <div class="preview-cake" id="preview-cake"></div>
      <p class="preview-message" id="preview-message">Tap when the round starts.</p>
      <button id="join-button" class="join-button">JOIN RACE</button>
    </div>
  </div>

  <!-- Full screen tap button -->
  <div id="tap-screen" class="tap-screen" style="display: none;">
    <div class="tap-cake" id="tap-cake"></div>
    <div class="tap-prompt" id="tap-prompt">TAP</div>
    <p class="tap-instructions" id="tap-instructions">Tap fast to race</p>
  </div>

  <!-- Loading state -->
  <div id="loading-screen" class="loading-screen" style="display: none;">
    <div class="loading-spinner"></div>
    <p>Joining race...</p>
  </div>

  <!-- Eliminated state -->
  <div id="eliminated-screen" class="eliminated-screen" style="display: none;">
    <div class="eliminated-cake" id="eliminated-cake"></div>
    <h2>Thanks for playing!</h2>
    <p class="eliminated-message">You've been eliminated</p>
  </div>

  <!-- Winner state -->
  <div id="winner-screen-player" class="winner-screen-player" style="display: none;">
    <div class="winner-cake-player" id="winner-cake-player"></div>
    <h2>🎉 YOU WON! 🎉</h2>
  </div>
  <script src="play.js"></script>
</body>
</html>
