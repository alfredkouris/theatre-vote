<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, minimum-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="mobile-web-app-capable" content="yes">
  <title>Race Control</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Lato:wght@300;400;700;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/race/styles.css">
  <style>
    * {
      touch-action: manipulation;
      -webkit-tap-highlight-color: transparent;
    }

    .mobile-admin-body {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: env(safe-area-inset-top, 32px) 24px env(safe-area-inset-bottom, 32px);
      background: #0a0a0a;
      gap: 28px;
      overflow-x: hidden;
    }

    .mobile-login,
    .mobile-control {
      width: 100%;
      max-width: 500px;
      display: flex;
      flex-direction: column;
      gap: 24px;
    }

    .mobile-login {
      align-items: center;
      text-align: center;
      gap: 32px;
    }

    .mobile-title {
      font-family: 'Bodoni 72', 'Bodoni MT', Georgia, serif;
      font-size: clamp(36px, 9vw, 52px);
      color: #f8f6f1;
      margin: 0;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      line-height: 1.1;
    }

    .mobile-code-input {
      width: 100%;
      max-width: 260px;
      font-family: 'Courier New', monospace;
      font-size: 40px;
      font-weight: 700;
      letter-spacing: 0.35em;
      text-align: center;
      padding: 24px;
      background: rgba(255, 255, 255, 0.08);
      border: 3px solid rgba(255, 255, 255, 0.2);
      border-radius: 24px;
      color: #f8f6f1;
      outline: none;
      transition: all 0.2s ease;
    }

    .mobile-code-input:focus {
      background: rgba(255, 255, 255, 0.12);
      border-color: rgba(255, 255, 255, 0.4);
    }

    .mobile-code-input::placeholder {
      color: rgba(255, 255, 255, 0.25);
      letter-spacing: 0.25em;
    }

    .mobile-status-card {
      background: rgba(255, 255, 255, 0.08);
      border: 2px solid rgba(255, 255, 255, 0.15);
      border-radius: 28px;
      padding: 32px;
      text-align: center;
    }

    .mobile-status-label {
      font-family: 'Courier New', monospace;
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: rgba(255, 255, 255, 0.5);
      margin-bottom: 16px;
    }

    .mobile-status-value {
      font-family: 'Bodoni 72', 'Bodoni MT', Georgia, serif;
      font-size: clamp(40px, 11vw, 64px);
      color: #f8f6f1;
      margin: 0;
      line-height: 1;
      text-transform: uppercase;
      letter-spacing: 0.04em;
    }

    .mobile-info {
      display: flex;
      gap: 16px;
      width: 100%;
    }

    .mobile-info-item {
      flex: 1;
      background: rgba(255, 255, 255, 0.06);
      border: 2px solid rgba(255, 255, 255, 0.12);
      border-radius: 20px;
      padding: 20px 16px;
      text-align: center;
    }

    .mobile-info-label {
      font-family: 'Courier New', monospace;
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: rgba(255, 255, 255, 0.45);
      margin-bottom: 12px;
      display: block;
    }

    .mobile-info-value {
      font-family: 'Bodoni 72', 'Bodoni MT', Georgia, serif;
      font-size: 38px;
      color: #f8f6f1;
      line-height: 1;
    }

    .mobile-btn {
      width: 100%;
      min-height: 96px;
      font-family: 'Bodoni 72', 'Bodoni MT', Georgia, serif;
      font-size: 32px;
      font-weight: 400;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      background: #f8f6f1;
      color: #0a0a0a;
      border: none;
      border-radius: 24px;
      cursor: pointer;
      transition: all 0.15s ease;
      box-shadow: 0 4px 16px rgba(248, 246, 241, 0.2);
    }

    .mobile-btn:active {
      transform: scale(0.96);
      box-shadow: 0 2px 8px rgba(248, 246, 241, 0.15);
    }

    .mobile-btn:disabled {
      opacity: 0.2;
      cursor: not-allowed;
      transform: none;
      box-shadow: none;
    }

    .mobile-btn-secondary {
      background: rgba(255, 255, 255, 0.1);
      color: rgba(255, 255, 255, 0.7);
      border: 2px solid rgba(255, 255, 255, 0.15);
      font-size: 22px;
      min-height: 72px;
      margin-top: 12px;
      box-shadow: none;
    }

    .mobile-btn-secondary:active {
      background: rgba(255, 255, 255, 0.08);
    }

    .mobile-toast {
      position: fixed;
      top: calc(env(safe-area-inset-top, 0px) + 24px);
      left: 24px;
      right: 24px;
      max-width: 500px;
      margin: 0 auto;
      background: #f8f6f1;
      border: none;
      border-radius: 20px;
      padding: 22px 24px;
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.6);
      font-family: Georgia, 'Times New Roman', serif;
      font-size: 17px;
      line-height: 1.4;
      color: #0a0a0a;
      text-align: center;
      transform: translateY(-200%);
      opacity: 0;
      transition: all 0.3s ease;
      z-index: 9999;
    }

    .mobile-toast.show {
      transform: translateY(0);
      opacity: 1;
    }
  </style>
</head>
<body class="mobile-admin-body">
  <!-- Login Form -->
  <div id="login-form" class="mobile-login">
    <h1 class="mobile-title">Race Control</h1>
    <input
      type="tel"
      id="password"
      class="mobile-code-input"
      placeholder="- - - -"
      maxlength="4"
      pattern="[0-9]*"
      inputmode="numeric"
      autocomplete="off">
  </div>

  <!-- Control Panel -->
  <div id="control-panel" class="mobile-control" style="display: none;">
    <div class="mobile-status-card">
      <div class="mobile-status-label">Status</div>
      <h2 id="status" class="mobile-status-value">Waiting</h2>
    </div>

    <div class="mobile-info">
      <div class="mobile-info-item">
        <span class="mobile-info-label">Round</span>
        <div id="current-round" class="mobile-info-value">-</div>
      </div>
      <div class="mobile-info-item">
        <span class="mobile-info-label">Players</span>
        <div id="player-count" class="mobile-info-value">0</div>
      </div>
    </div>

    <button onclick="startRound()" id="start-btn" class="mobile-btn">
      Start Round
    </button>

    <button onclick="stopRound()" id="stop-btn" class="mobile-btn" disabled>
      Continue
    </button>

    <button onclick="resetGame()" class="mobile-btn mobile-btn-secondary">
      Reset Game
    </button>
  </div>

  <!-- Toast -->
  <div id="mobile-toast" class="mobile-toast"></div>

  <script>
    const ADMIN_CODE = '1234';
    let adminPassword = null;
    let raceState = null;

    // Toast System
    function showToast(message) {
      const toast = document.getElementById('mobile-toast');
      toast.textContent = message;
      toast.classList.add('show');

      setTimeout(() => {
        toast.classList.remove('show');
      }, 3000);
    }

    // Login
    const passwordInput = document.getElementById('password');

    passwordInput.addEventListener('input', (e) => {
      const value = e.target.value;

      if (value.length === 4) {
        if (value === ADMIN_CODE) {
          adminPassword = value;
          document.getElementById('login-form').style.display = 'none';
          document.getElementById('control-panel').style.display = 'flex';
          startPolling();
        } else {
          showToast('Incorrect code');
          passwordInput.value = '';
        }
      }
    });

    // Focus input on load
    window.addEventListener('load', () => {
      setTimeout(() => passwordInput.focus(), 300);
    });

    async function startRound() {
      try {
        const response = await fetch('/api/race/admin/start', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ password: adminPassword })
        });

        const data = await response.json();

        if (data.success) {
          showToast(`Round ${data.round} started`);
        } else {
          showToast(data.error || 'Failed to start');
        }
      } catch (error) {
        showToast('Connection error');
        console.error(error);
      }
    }

    async function stopRound() {
      try {
        const response = await fetch('/api/race/admin/stop', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ password: adminPassword })
        });

        const data = await response.json();

        if (data.success) {
          if (data.complete) {
            const winner = raceState.players[data.winner];
            showToast(`Winner: ${winner.name}!`);
          } else {
            showToast('Round complete');
          }
        } else {
          showToast(data.error || 'Failed to stop');
        }
      } catch (error) {
        showToast('Connection error');
        console.error(error);
      }
    }

    async function resetGame() {
      if (!confirm('Reset the entire game?')) {
        return;
      }

      try {
        const response = await fetch('/api/race/admin/reset', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ password: adminPassword })
        });

        const data = await response.json();

        if (data.success) {
          showToast('Game reset');
        } else {
          showToast(data.error || 'Failed to reset');
        }
      } catch (error) {
        showToast('Connection error');
        console.error(error);
      }
    }

    function updateDisplay(state) {
      raceState = state;

      // Update status
      const statusText = {
        'waiting': 'Waiting',
        'racing': 'Racing',
        'results': 'Round Done',
        'complete': 'Complete'
      }[state.status] || state.status;

      document.getElementById('status').textContent = statusText;

      // Update round
      document.getElementById('current-round').textContent = state.currentRound || '-';

      // Update player count
      const totalPlayers = Object.keys(state.players).length;
      document.getElementById('player-count').textContent = totalPlayers;

      // Update button states
      const startBtn = document.getElementById('start-btn');
      const stopBtn = document.getElementById('stop-btn');

      if (state.status === 'racing') {
        startBtn.disabled = true;
        stopBtn.disabled = false;
      } else {
        startBtn.disabled = false;
        stopBtn.disabled = true;
      }
    }

    async function pollStatus() {
      try {
        const response = await fetch('/api/race/status');
        const state = await response.json();
        updateDisplay(state);
      } catch (error) {
        console.error('Error polling status:', error);
      }
    }

    function startPolling() {
      pollStatus();
      setInterval(pollStatus, 1000);
    }
  </script>
</body>
</html>
