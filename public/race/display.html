<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cake Race</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Lato:wght@300;400;700;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/race/styles.css">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
  <script src="/race/cakes.js"></script>
  <script src="/race/cupcake-motion.js"></script>
</head>
<body class="game-display">
  <div class="game-hud">
    <div class="hud-left">
      <div class="round-badge">
        <span class="round-label">ROUND</span>
        <span class="round-number" id="round-num">-</span>
      </div>
    </div>

    <div class="hud-center">
      <div class="timer-container">
        <div class="scoreboard-timer" id="timer-badge">
          <div class="timer-display">
            <span class="timer-value" id="timer">00:30</span>
          </div>
        </div>
        <div class="timer-status" id="timer-status">WAITING FOR PLAYERS</div>
      </div>
    </div>

    <div class="hud-right">
      <div class="hud-qr" id="hud-qr" hidden>
        <div id="hud-qrcode"></div>
        <span class="hud-qr-label">SCAN TO JOIN</span>
      </div>
    </div>
  </div>

  <div class="racing-track">
    <div class="track-container" id="track-container">
      <div class="waiting-state" id="waiting-state">WAITING FOR PLAYERS...</div>

      <div class="lobby-hold" id="lobby-hold">
        <div class="lobby-qr-badge">
          <div id="qrcode"></div>
          <span class="lobby-qr-label">SCAN TO JOIN</span>
        </div>
      </div>

      <div class="lobby-layer" id="lobby-layer" aria-hidden="true"></div>
      <div class="race-layer" id="race-layer" aria-hidden="true"></div>

      <div class="results-screen" id="results-screen" hidden>
        <div class="results-kicker" id="results-kicker">ROUND COMPLETE</div>
        <h2 class="results-title" id="results-title">Round locked</h2>
        <p class="results-subtitle" id="results-subtitle">Waiting for the next start.</p>

        <div class="results-simple" id="round-results">
          <div class="results-panel-heading" id="results-board-heading">ADVANCING CUPCAKES</div>
          <div class="results-grid" id="results-grid"></div>
        </div>

        <div class="podium-screen" id="podium-screen" hidden>
          <div class="podium" id="podium"></div>
          <div class="results-panel-heading">EVERYONE ELSE</div>
          <div class="remaining-grid" id="remaining-grid"></div>
        </div>
      </div>
    </div>

    <div class="finish-line-area">
      <div class="finish-text">FINISH</div>
      <div class="finish-flag">🏁</div>
    </div>
  </div>

  <script src="/race/display.js"></script>
</body>
</html>
