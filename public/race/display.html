<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cake Race</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Lato:wght@300;400;700;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
  <script src="cakes.js"></script>
</head>
<body class="game-display">
  <!-- Game HUD -->
  <div class="game-hud">
    <div class="hud-left">
      <div class="round-badge">
        <span class="round-label">ROUND</span>
        <span class="round-number" id="round-num">-</span>
      </div>
    </div>

    <div class="hud-center">
      <div class="timer-container">
        <div class="scoreboard-timer" id="timer-badge">
          <div class="timer-display">
            <span class="timer-value" id="timer">00:30</span>
          </div>
        </div>
        <div class="timer-status" id="timer-status">WAITING FOR PLAYERS</div>
      </div>
    </div>

    <div class="hud-right"></div>
  </div>

  <!-- Racing Track -->
  <div class="racing-track">
    <div class="track-container" id="track-container">
      <div class="waiting-state" id="waiting-state">WAITING FOR PLAYERS...</div>
      <div class="lobby-hold" id="lobby-hold">
        <div class="lobby-qr-badge">
          <div id="qrcode"></div>
          <span class="lobby-qr-label">SCAN TO JOIN</span>
          <span class="lobby-qr-detail">Open the race page on your phone and tap join.</span>
        </div>
      </div>
      <div class="lobby-layer" id="lobby-layer" aria-hidden="true"></div>
      <div class="race-layer" id="race-layer" aria-hidden="true"></div>
      <div class="more-racers" id="more-racers" hidden></div>
    </div>

    <div class="finish-line-area">
      <div class="finish-text">FINISH</div>
      <div class="finish-flag">🏁</div>
    </div>
  </div>

  <!-- Winner Screen -->
  <div id="winner-screen" class="winner-screen" style="display: none;">
    <div class="winner-fireworks">
      <div class="firework"></div>
      <div class="firework"></div>
      <div class="firework"></div>
    </div>
    <div class="winner-content">
      <h2 class="winner-title">WINNER!</h2>
      <div id="winner-cake" class="winner-cake"></div>
      <p id="winner-name" class="winner-name" hidden></p>
    </div>
  </div>
  <script src="display.js"></script>
</body>
</html>
