<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cake Race</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Lato:wght@300;400;700;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
  <script src="cakes.js"></script>
</head>
<body class="game-display">
  <!-- Game HUD -->
  <div class="game-hud">
    <div class="hud-left">
      <div class="round-badge">
        <span class="round-label">ROUND</span>
        <span class="round-number" id="round-num">-</span>
      </div>
    </div>

    <div class="hud-center">
      <div class="timer-container">
        <div class="scoreboard-timer" id="timer-badge">
          <div class="timer-display">
            <span class="timer-value" id="timer">30</span>
          </div>
        </div>
        <div class="timer-status" id="timer-status">WAITING FOR PLAYERS</div>
      </div>
    </div>

    <div class="hud-right">
      <div class="qr-badge">
        <div id="qrcode"></div>
        <span class="qr-text">SCAN TO JOIN</span>
      </div>
    </div>
  </div>

  <!-- Racing Track -->
  <div class="racing-track">
    <div class="track-container" id="track-container">
      <!-- Lanes generated dynamically -->
    </div>

    <div class="finish-line-area">
      <div class="finish-flag">🏁</div>
    </div>
  </div>

  <!-- Winner Screen -->
  <div id="winner-screen" class="winner-screen" style="display: none;">
    <div class="winner-fireworks">
      <div class="firework"></div>
      <div class="firework"></div>
      <div class="firework"></div>
    </div>
    <div class="winner-content">
      <h2 class="winner-title">WINNER!</h2>
      <div id="winner-cake" class="winner-cake"></div>
      <p id="winner-name" class="winner-name"></p>
    </div>
  </div>

  <script>
    // Generate QR code
    const playUrl = `${window.location.origin}/race/play.html`;
    new QRCode(document.getElementById("qrcode"), {
      text: playUrl,
      width: 100,
      height: 100,
      colorDark: "#000",
      colorLight: "#fff"
    });

    let raceState = null;
    let pollInterval = null;

    function updateDisplay(state) {
      raceState = state;

      // Update HUD
      const roundNum = state.currentRound || '-';
      document.getElementById('round-num').textContent = roundNum;

      // Update timer
      const timerBadge = document.getElementById('timer-badge');
      const timerStatus = document.getElementById('timer-status');

      if (state.status === 'racing' && state.rounds[state.currentRound]) {
        const round = state.rounds[state.currentRound];
        const elapsed = Date.now() - round.startTime;
        const remaining = Math.max(0, 30 - Math.floor(elapsed / 1000));
        document.getElementById('timer').textContent = remaining;
        timerStatus.style.display = 'none';

        // Warning color when time running out
        if (remaining <= 5) {
          timerBadge.classList.add('warning');
        } else {
          timerBadge.classList.remove('warning');
        }
      } else if (state.status === 'complete') {
        document.getElementById('timer').textContent = '0';
        timerStatus.style.display = 'none';
        showWinner(state);
      } else {
        document.getElementById('timer').textContent = '30';
        timerStatus.style.display = 'block';
        timerBadge.classList.remove('warning');
      }

      // Update track
      updateTrack(state);
    }

    function updateTrack(state) {
      const trackContainer = document.getElementById('track-container');
      const currentRound = state.rounds[state.currentRound];

      // Show free-roaming cakes when waiting
      if (state.status === 'waiting') {
        // Only show visible players (those who clicked JOIN)
        const players = Object.values(state.players).filter(p => p.visible);

        if (players.length === 0) {
          trackContainer.innerHTML = '<div class="waiting-state">WAITING FOR PLAYERS...</div>';
          return;
        }

        trackContainer.innerHTML = '';
        trackContainer.className = 'track-container free-roam';

        players.forEach((player, index) => {
          const cake = getCakeById(player.cakeId);

          // Wii-style walking animation - horizontal movement with bobbing
          const startX = -10; // Start off-screen left
          const delay = index * 0.5; // Stagger entries

          const cakeElement = document.createElement('div');
          cakeElement.className = 'roaming-cake';
          cakeElement.setAttribute('data-player-id', player.id);
          cakeElement.style.animationDelay = delay + 's';
          cakeElement.innerHTML = generateCakeSVG(cake);

          trackContainer.appendChild(cakeElement);
        });

        return;
      }

      // Racing mode - show lanes
      trackContainer.className = 'track-container';

      if (!currentRound || !currentRound.participants || currentRound.participants.length === 0) {
        trackContainer.innerHTML = '<div class="waiting-state">WAITING FOR PLAYERS...</div>';
        return;
      }

      // Get participants sorted by distance
      const participants = currentRound.participants
        .map(playerId => ({
          playerId,
          player: state.players[playerId],
          distance: currentRound.positions[playerId] || 0,
          taps: currentRound.taps[playerId] || 0
        }))
        .filter(p => p.player)
        .sort((a, b) => b.distance - a.distance);

      // Show top 10 racers (or all if fewer)
      const displayRacers = participants.slice(0, 10);

      // Update or create lanes
      trackContainer.innerHTML = '';

      displayRacers.forEach((participant, index) => {
        const { playerId, player, distance } = participant;
        const cake = getCakeById(player.cakeId);

        const lane = document.createElement('div');
        lane.className = 'race-lane';
        lane.setAttribute('data-player-id', playerId);

        // Leader highlight
        if (index === 0 && distance > 0) {
          lane.classList.add('leading');
        }

        const progressPercent = Math.min(100, (distance / 1000) * 100); // Max 1000px = 100%

        lane.innerHTML = `
          <div class="lane-bg"></div>
          <div class="lane-position">#${index + 1}</div>
          <div class="racer" style="transform: translateX(calc(${progressPercent}vw - 100px));">
            ${generateCakeSVG(cake)}
          </div>
          <div class="lane-nameplate">
            <span class="racer-name">${player.name}</span>
          </div>
        `;

        trackContainer.appendChild(lane);
      });

      // Show "+X more" if there are hidden racers
      if (participants.length > 10) {
        const moreDiv = document.createElement('div');
        moreDiv.className = 'more-racers';
        moreDiv.textContent = `+${participants.length - 10} more racers`;
        trackContainer.appendChild(moreDiv);
      }
    }

    function showWinner(state) {
      const round4 = state.rounds[4] || state.rounds[state.currentRound];
      if (!round4 || !round4.winners || round4.winners.length === 0) return;

      const winnerId = round4.winners[0];
      const winner = state.players[winnerId];
      if (!winner) return;

      const screen = document.getElementById('winner-screen');
      const cakeContainer = document.getElementById('winner-cake');
      const nameElement = document.getElementById('winner-name');

      cakeContainer.innerHTML = generateCakeSVG(getCakeById(winner.cakeId));
      nameElement.textContent = winner.name;

      screen.style.display = 'flex';
    }

    async function fetchState() {
      try {
        const response = await fetch('/api/race/status');
        const state = await response.json();
        updateDisplay(state);

        if (raceState && state.status !== raceState.status) {
          startPolling();
        }
      } catch (error) {
        console.error('Error fetching race state:', error);
      }
    }

    function startPolling() {
      fetchState();
      if (pollInterval) clearInterval(pollInterval);
      pollInterval = setInterval(() => {
        fetchState();
      }, raceState && raceState.status === 'racing' ? 100 : 1000);
    }

    window.addEventListener('load', () => {
      startPolling();
    });
  </script>
</body>
</html>
