<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Survey Display - Harry's Behaviour</title>
  <link rel="stylesheet" href="styles.css">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
</head>
<body>
  <div class="display-container">
    <section class="qr-section">
      <h1>What did you think of Harry's behaviour?</h1>
      <div id="qrcode"></div>
      <div class="vote-url" id="vote-url"></div>
    </section>

    <section class="graph-section">
      <div class="vote-counts">
        <article class="count-item">
          <span class="label">Agree</span>
          <span class="value" id="agree-count">0</span>
        </article>
        <article class="count-item">
          <span class="label">Disagree</span>
          <span class="value" id="disagree-count">0</span>
        </article>
      </div>

      <div class="survey-bars">
        <div class="survey-bar-card">
          <div class="survey-bar-label-row">
            <span>Agree</span>
            <span id="agree-percent">0%</span>
          </div>
          <div class="survey-bar-track">
            <div class="survey-bar-fill survey-bar-fill-agree" id="agree-bar"></div>
          </div>
        </div>

        <div class="survey-bar-card">
          <div class="survey-bar-label-row">
            <span>Disagree</span>
            <span id="disagree-percent">0%</span>
          </div>
          <div class="survey-bar-track">
            <div class="survey-bar-fill survey-bar-fill-disagree" id="disagree-bar"></div>
          </div>
        </div>
      </div>

      <button class="reset-btn" id="reset-btn" type="button">Reset Survey</button>
    </section>
  </div>

  <script>
    const surveyUrl = `${window.location.origin}/survey/vote`;

    function renderQrCode() {
      const qrContainer = document.getElementById('qrcode');
      qrContainer.innerHTML = '';

      new QRCode(qrContainer, {
        text: surveyUrl,
        width: 240,
        height: 240,
        colorDark: '#111111',
        colorLight: '#ffffff'
      });

      document.getElementById('vote-url').textContent = surveyUrl.replace(/^https?:\/\//, '');
    }

    function updateDisplay(votes) {
      const agree = Number(votes.agree) || 0;
      const disagree = Number(votes.disagree) || 0;
      const total = agree + disagree;
      const agreePercent = total === 0 ? 0 : Math.round((agree / total) * 100);
      const disagreePercent = total === 0 ? 0 : 100 - agreePercent;

      document.getElementById('agree-count').textContent = agree;
      document.getElementById('disagree-count').textContent = disagree;
      document.getElementById('agree-percent').textContent = `${agreePercent}%`;
      document.getElementById('disagree-percent').textContent = `${disagreePercent}%`;
      document.getElementById('agree-bar').style.width = `${agreePercent}%`;
      document.getElementById('disagree-bar').style.width = `${disagreePercent}%`;
    }

    async function fetchVotes() {
      try {
        const response = await fetch('/api/votes');
        const votes = await response.json();
        updateDisplay(votes);
      } catch (error) {
        console.error('Error fetching votes:', error);
      }
    }

    async function resetVotes() {
      try {
        await fetch('/api/reset', { method: 'POST' });
        fetchVotes();
      } catch (error) {
        console.error('Error resetting votes:', error);
      }
    }

    document.getElementById('reset-btn').addEventListener('click', resetVotes);

    renderQrCode();
    fetchVotes();
    window.setInterval(fetchVotes, 500);
  </script>
</body>
</html>
