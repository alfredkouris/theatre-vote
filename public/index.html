<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Survey Display - Harry's Behaviour</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=EB+Garamond:ital,wght@1,400;1,700;1,800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css?v=3">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
</head>
<body class="survey-body">
  <div class="survey-fullscreen">
    <h1 class="survey-title">What do you think of Harry's behaviour?</h1>

    <div class="survey-content">
      <div class="column-graph">
        <div class="bars-container">
          <div class="bar-column">
            <div class="column-bar-fill column-bar-agree" id="agree-bar"></div>
          </div>
          <div class="bar-column">
            <div class="column-bar-fill column-bar-disagree" id="disagree-bar"></div>
          </div>
        </div>
        <div class="labels-container">
          <div class="label-group">
            <div class="column-count" id="agree-count">0</div>
            <div class="column-label">Agree</div>
          </div>
          <div class="label-group">
            <div class="column-count" id="disagree-count">0</div>
            <div class="column-label">Disagree</div>
          </div>
        </div>
      </div>

      <div class="qr-container">
        <div id="qrcode"></div>
      </div>
    </div>
  </div>

  <script>
    const surveyUrl = `${window.location.origin}/survey/vote`;
    let clickCount = 0;
    let clickTimer = null;
    let previousVotes = { agree: 0, disagree: 0 };

    function renderQrCode() {
      const qrContainer = document.getElementById('qrcode');
      qrContainer.innerHTML = '';

      new QRCode(qrContainer, {
        text: surveyUrl,
        width: 200,
        height: 200,
        colorDark: '#111111',
        colorLight: '#ffffff'
      });
    }

    function updateDisplay(votes) {
      const agree = Number(votes.agree) || 0;
      const disagree = Number(votes.disagree) || 0;
      const total = agree + disagree;
      const agreePercent = total === 0 ? 50 : Math.round((agree / total) * 100);
      const disagreePercent = total === 0 ? 50 : 100 - agreePercent;

      const hasChanged = agree !== previousVotes.agree || disagree !== previousVotes.disagree;

      document.getElementById('agree-count').textContent = agree;
      document.getElementById('disagree-count').textContent = disagree;

      const agreeBar = document.getElementById('agree-bar');
      const disagreeBar = document.getElementById('disagree-bar');

      agreeBar.style.height = `${agreePercent}%`;
      disagreeBar.style.height = `${disagreePercent}%`;

      if (hasChanged) {
        agreeBar.classList.add('animate');
        disagreeBar.classList.add('animate');

        setTimeout(() => {
          agreeBar.classList.remove('animate');
          disagreeBar.classList.remove('animate');
        }, 600);

        previousVotes = { agree, disagree };
      }
    }

    async function fetchVotes() {
      try {
        const response = await fetch('/api/votes');
        const votes = await response.json();
        updateDisplay(votes);
      } catch (error) {
        console.error('Error fetching votes:', error);
      }
    }

    async function resetVotes() {
      try {
        await fetch('/api/reset', { method: 'POST' });
        fetchVotes();
      } catch (error) {
        console.error('Error resetting votes:', error);
      }
    }

    document.getElementById('qrcode').addEventListener('click', () => {
      clickCount++;

      if (clickTimer) {
        clearTimeout(clickTimer);
      }

      if (clickCount === 3) {
        resetVotes();
        clickCount = 0;
      } else {
        clickTimer = setTimeout(() => {
          clickCount = 0;
        }, 500);
      }
    });

    renderQrCode();
    fetchVotes();
    window.setInterval(fetchVotes, 500);
  </script>
</body>
</html>
